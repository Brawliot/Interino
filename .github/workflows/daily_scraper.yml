name: Vigía diario CLM
on:
  schedule:
    - cron: '0 8 * * *'   # Todos los días a las 8:00 UTC
  workflow_dispatch:

jobs:
  vigia-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install boto3

      - name: Vigía — comprobar cambios en portales
        id: vigia
        continue-on-error: true
        run: python vigia.py

      - name: Scrapear sectores con cambios
        if: steps.vigia.outcome == 'failure'
        run: python scripts/ejecutar_vigia_scrapers.py

      - name: Subir sectores a R2
        if: steps.vigia.outcome == 'failure'
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: interino-data
        run: |
          if [ -f data/_local/vigia_sectores_r2.json ]; then
            python scripts/subir_sectores_r2.py --skip-existing
          else
            echo "Sin sectores R2 pendientes"
          fi

      - name: Auditoría smoke R2
        if: steps.vigia.outcome == 'failure'
        continue-on-error: true
        env:
          R2_PUBLIC_URL: https://pub-1d2aaf9854a14a9b98dac42c39874392.r2.dev
        run: python scripts/auditar_paridad_clm.py --smoke

      - name: Commit y push (sanidad + metadatos + vigía)
        if: steps.vigia.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data/public data/_local
          git add data/public/ \
            data/_local/vigia_estado.json \
            data/_local/vigia_cambios.json \
            data/_local/vigia_sectores_r2.json \
            data/admin-clm/categorias.json
          git diff --staged --quiet || git commit -m "Actualizacion automatica CLM - $(date +'%Y-%m-%d')"
          git push
