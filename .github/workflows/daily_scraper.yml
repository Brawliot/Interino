name: Scraper Diario SESCAM
on:
  schedule:
    - cron: '0 8 * * *'   # Todos los días a las 8:00 UTC
  workflow_dispatch:      # Permite ejecución manual desde la pestaña Actions

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # scrape completo solo si vigía detecta cambios
    permissions:
      contents: write    # necesario para hacer push al repo

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Vigía — comprobar cambios en portal
        id: vigia
        continue-on-error: true
        run: python vigia.py

      - name: Scrapear grupos con cambios
        if: steps.vigia.outcome == 'failure'
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          with open("data/vigia_cambios.json", encoding="utf-8") as f:
              cambios = json.load(f).get("cambios", [])
          if not cambios:
              print("Vigía marcó cambio pero no hay grupos en vigia_cambios.json")
              sys.exit(1)
          for grupo in cambios:
              print(f"=== Scrapeando {grupo} ===")
              subprocess.run(
                  ["python", "scraper.py", "--grupo", grupo, "--presupuesto", "7200"],
                  check=True,
              )
          PY

      - name: Commit y push de data/ (vigía + listados si hubo scrape)
        if: steps.vigia.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          git add data/vigia_estado.json data/vigia_cambios.json data/
          git diff --staged --quiet || git commit -m "Actualizacion automatica SESCAM - $(date +'%Y-%m-%d')"
          git push
